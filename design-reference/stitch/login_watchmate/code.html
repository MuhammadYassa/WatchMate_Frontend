<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Login | WatchMate</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
        .glass-panel {
            background: rgba(30, 31, 35, 0.6);
            backdrop-filter: blur(40px);
            -webkit-backdrop-filter: blur(40px);
            border: 1px solid rgba(255, 255, 255, 0.15);
        }
        .vignette-overlay {
            background: radial-gradient(circle, transparent 20%, rgba(18, 19, 23, 0.9) 100%);
        }
        .hero-gradient {
            background: linear-gradient(to bottom, transparent 0%, #121317 100%);
        }
        .input-focus-glow:focus-within {
            box-shadow: 0 0 15px rgba(216, 226, 255, 0.2);
            border-color: #d8e2ff;
        }
        .button-gloss:hover {
            background: linear-gradient(180deg, #d8e2ff 0%, #adc6ff 100%);
            box-shadow: 0 0 20px rgba(216, 226, 255, 0.4);
        }
    </style>

          darkMode: "class",
          theme: {
            extend: {
              "colors": {
                      "on-secondary": "#2b303d",
                      "on-background": "#e3e2e7",
                      "on-surface": "#e3e2e7",
                      "tertiary": "#ffdea4",
                      "on-secondary-fixed": "#171b27",
                      "outline-variant": "#44474f",
                      "secondary-container": "#424754",
                      "on-secondary-container": "#b0b5c4",
                      "on-tertiary": "#412d00",
                      "on-tertiary-fixed": "#261900",
                      "inverse-surface": "#e3e2e7",
                      "background": "#121317",
                      "on-tertiary-container": "#6c4d01",
                      "on-error-container": "#ffdad6",
                      "tertiary-fixed": "#ffdea5",
                      "surface-tint": "#adc6ff",
                      "inverse-on-surface": "#2f3034",
                      "tertiary-fixed-dim": "#ebc06e",
                      "inverse-primary": "#455e90",
                      "secondary": "#c2c6d6",
                      "on-primary-fixed": "#001a42",
                      "outline": "#8e909a",
                      "surface-container-highest": "#343538",
                      "secondary-fixed-dim": "#c2c6d6",
                      "on-primary-fixed-variant": "#2c4677",
                      "surface-dim": "#121317",
                      "surface": "#121317",
                      "surface-bright": "#38393d",
                      "error": "#ffb4ab",
                      "on-error": "#690005",
                      "surface-variant": "#343538",
                      "primary-fixed": "#d8e2ff",
                      "secondary-fixed": "#dee2f2",
                      "primary-container": "#adc6ff",
                      "on-primary": "#122f5f",
                      "tertiary-container": "#ebc06e",
                      "surface-container-lowest": "#0d0e11",
                      "on-secondary-fixed-variant": "#424754",
                      "on-primary-container": "#385283",
                      "primary-fixed-dim": "#adc6ff",
                      "error-container": "#93000a",
                      "surface-container-high": "#292a2d",
                      "surface-container-low": "#1a1b1f",
                      "primary": "#d8e2ff",
                      "on-tertiary-fixed-variant": "#5d4200",
                      "on-surface-variant": "#c4c6d0",
                      "surface-container": "#1e1f23"
              },
              "borderRadius": {
                      "DEFAULT": "0.125rem",
                      "lg": "0.25rem",
                      "xl": "0.5rem",
                      "full": "0.75rem"
              },
              "spacing": {
                      "unit": "8px",
                      "gutter": "16px",
                      "section-gap": "48px",
                      "container-margin": "24px"
              },
              "fontFamily": {
                      "display-lg-mobile": ["Playfair Display"],
                      "body-md": ["Inter"],
                      "label-sm": ["Inter"],

          },

<body class="bg-background text-on-background min-h-screen flex flex-col font-body-md overflow-hidden">
<!-- Cinematic Background -->
<div class="fixed inset-0 z-0">
<div class="absolute inset-0 bg-cover bg-center scale-105 blur-[2px]" data-alt="A cinematic wide shot of a moody, dimly lit private home theater with deep navy velvet seats and a soft blue projector light reflecting off a polished dark floor. The atmosphere is quiet, premium, and sophisticated, echoing a midnight movie screening. Cinematic lighting with deep shadows and subtle teal and orange color grading." style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuC2mxI5ZPpKUY0jI5JbeEQh3k5Oo2Vl_7mw0-KktZLvCCtrg-fZBHVx2kCqc0H5eqbuUZdtlvzlBF9SyzGuBDrukd8WZV6zG-5Cmmdo7SpkIXXeD6Ih9EzWEvcA1SdWSmzkgu-Lgt2urlxVGmcQ0f3aY3nv4Y0ZOmftZNlbHnjJWn8WzSbkGwK1dVg17RqdabZXGNY7xDBxWzg8ajrUKaabAqzezat_wJfFoxxbJw1FY2n8668hXs_tNkoMY5jpYlVHSFOHVfGEmsdG')">
</div>
<div class="absolute inset-0 vignette-overlay"></div>
<div class="absolute inset-0 hero-gradient"></div>
</div>
<!-- Main Content Canvas -->
<main class="relative z-10 flex-grow flex items-center justify-center px-container-margin py-section-gap">
<!-- Login Card -->
<div class="glass-panel w-full max-w-md rounded-xl p-8 md:p-10 shadow-2xl transition-all duration-500 animate-in fade-in zoom-in slide-in-from-bottom-8">
<!-- Logo / Brand Anchor -->
<div class="text-center mb-10">
<h1 class="font-display-lg text-display-lg-mobile md:text-display-lg text-primary tracking-tight mb-2">WatchMate</h1>
<p class="font-label-sm text-label-sm text-on-surface-variant uppercase tracking-widest">Premium Cinema Experience</p>
</div>
<!-- Login Form -->
<form action="#" class="space-y-6" onsubmit="event.preventDefault();">
<!-- Username/Email Field -->
<div class="space-y-2">
<label class="font-label-sm text-label-sm text-on-surface-variant block px-1" for="identity">Username or Email</label>
<div class="relative group input-focus-glow rounded-lg border border-white/10 bg-surface-container-low transition-all">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-on-surface-variant text-[20px]">mail</span>
<input class="w-full bg-transparent border-none focus:ring-0 py-3.5 pl-11 pr-4 text-on-surface placeholder:text-on-surface-variant/40 rounded-lg" id="identity" placeholder="Enter your credentials" type="text"/>
</div>
</div>
<!-- Password Field -->
<div class="space-y-2">
<div class="flex justify-between items-center px-1">
<label class="font-label-sm text-label-sm text-on-surface-variant" for="password">Password</label>
</div>
<div class="relative group input-focus-glow rounded-lg border border-white/10 bg-surface-container-low transition-all">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-on-surface-variant text-[20px]">lock</span>
<input class="w-full bg-transparent border-none focus:ring-0 py-3.5 pl-11 pr-12 text-on-surface placeholder:text-on-surface-variant/40 rounded-lg" id="password" placeholder="••••••••" type="password"/>
<button class="absolute right-3 top-1/2 -translate-y-1/2 text-on-surface-variant hover:text-primary transition-colors" type="button">
<span class="material-symbols-outlined text-[20px]">visibility</span>
</button>
</div>
</div>
<!-- Remember Me & Forgot Password -->
<div class="flex items-center justify-between">
<label class="flex items-center space-x-2 cursor-pointer group">
<input class="w-4 h-4 rounded bg-surface-container border-white/10 text-primary focus:ring-offset-background focus:ring-primary" type="checkbox"/>
<span class="font-label-sm text-label-sm text-on-surface-variant group-hover:text-on-surface transition-colors">Stay Signed In</span>
</label>
</div>
<!-- Primary Login Action -->
<button class="button-gloss w-full py-4 bg-primary text-on-primary font-semibold rounded-xl transition-all duration-300 transform active:scale-[0.98] flex items-center justify-center gap-2 group" type="submit">
<span class="font-body-md">Login to Theater</span>
<span class="material-symbols-outlined text-[18px] transition-transform group-hover:translate-x-1">arrow_forward</span>
</button>
</form>
<!-- Links & Secondary Actions -->
<div class="mt-10 pt-8 border-t border-white/5 space-y-4 text-center">
<p class="font-body-md text-on-surface-variant">
                    New to WatchMate? 
                    <a class="text-primary hover:underline transition-all font-semibold ml-1" href="#">Register</a>
</p>
<div class="flex flex-col gap-2">
<a class="font-label-sm text-label-sm text-on-surface-variant hover:text-primary transition-colors flex items-center justify-center gap-1" href="#">
<span class="material-symbols-outlined text-[14px]">verified</span>
                        Verify your email / Resend link
                    </a>
</div>
</div>
</div>
</main>
<!-- Footer - Simplified for Login -->
<footer class="relative z-10 py-8 px-container-margin">
<div class="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center gap-4">
<p class="font-label-sm text-label-sm text-on-surface-variant opacity-60">© 2024 WatchMate. All rights reserved.</p>
<div class="flex gap-6">
<a class="font-label-sm text-label-sm text-on-surface-variant hover:text-primary underline transition-all" href="#">Privacy</a>
<a class="font-label-sm text-label-sm text-on-surface-variant hover:text-primary underline transition-all" href="#">Terms</a>
<a class="font-label-sm text-label-sm text-on-surface-variant hover:text-primary underline transition-all" href="#">Help</a>
</div>
</div>
</footer>
<!-- Interactive Atmosphere Script -->
<script>
        document.addEventListener('mousemove', (e) => {
            const moveX = (e.clientX - window.innerWidth / 2) * 0.01;
            const moveY = (e.clientY - window.innerHeight / 2) * 0.01;
            const bg = document.querySelector('.bg-cover');
            if (bg) {
                bg.style.transform = `scale(1.05) translate(${moveX}px, ${moveY}px)`;
            }
        });

        // Simple input focus effects for better glassmorphism feel
        const inputs = document.querySelectorAll('input');
        inputs.forEach(input => {
            input.addEventListener('focus', () => {
                input.closest('.input-focus-glow').style.background = 'rgba(255, 255, 255, 0.05)';
            });
            input.addEventListener('blur', () => {
                input.closest('.input-focus-glow').style.background = 'rgba(26, 27, 31, 0.4)';
            });
        });
    </script>
</body></html>
